<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" role="img" aria-label="Whiskey barrel">
  <defs>
    <clipPath id="barrel-clip">
      <path d="M30,15 C6,45 6,115 30,145 L90,145 C114,115 114,45 90,15 Z"/>
    </clipPath>
  </defs>

  <!-- Barrel body fill -->
  <path d="M30,15 C6,45 6,115 30,145 L90,145 C114,115 114,45 90,15 Z" fill="#2a1510"/>

  <!-- Stave lines (clipped to barrel shape) -->
  <g clip-path="url(#barrel-clip)" stroke="#3d1e0e" stroke-width="1.5">
    <line x1="45" y1="0" x2="45" y2="160"/>
    <line x1="60" y1="0" x2="60" y2="160"/>
    <line x1="75" y1="0" x2="75" y2="160"/>
  </g>

  <!-- Barrel body outline -->
  <path d="M30,15 C6,45 6,115 30,145 L90,145 C114,115 114,45 90,15 Z"
        fill="none" stroke="#c8963e" stroke-width="2.2"/>

  <!-- Top end cap -->
  <ellipse cx="60" cy="15" rx="30" ry="7" fill="#2a1510" stroke="#c8963e" stroke-width="2"/>

  <!-- Bottom end cap -->
  <ellipse cx="60" cy="145" rx="30" ry="7" fill="#2a1510" stroke="#c8963e" stroke-width="2"/>

  <!-- Top hoop -->
  <ellipse cx="60" cy="34" rx="34" ry="7" fill="none" stroke="#c8963e" stroke-width="3"/>

  <!-- Middle hoop (widest point) -->
  <ellipse cx="60" cy="80" rx="51" ry="9" fill="none" stroke="#c8963e" stroke-width="3.5"/>

  <!-- Bottom hoop -->
  <ellipse cx="60" cy="126" rx="34" ry="7" fill="none" stroke="#c8963e" stroke-width="3"/>

  <!-- Bung hole -->
  <circle cx="60" cy="80" r="5" fill="#1f1008" stroke="#e8b55a" stroke-width="1.5"/>
</svg>
